name: Python tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run tests
        run: uv run pytest tests/ --cov=reviewforge --cov-fail-under=97

  pin-agreement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Azure Pipelines consumes shared pins
        run: |
          test -f versions.env
          grep -q 'versions.env' azure-pipelines-pr-review.yml
          ! grep -Eq '^[[:space:]]+(PI_VERSION|PI_MODEL):' azure-pipelines-pr-review.yml
